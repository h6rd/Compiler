name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller rich

      - name: Build
        run: pyinstaller --onefile --console --collect-all rich --name "Compiler" --icon=icon.ico Compiler.py

      - name: Zip
        run: |
          New-Item -ItemType Directory -Path Compiler
          Copy-Item dist\Compiler.exe Compiler\Compiler.exe
          Compress-Archive -Path Compiler -DestinationPath Compiler-Win.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: Compiler-Win.zip

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Compiler-Win.zip
